<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .form-container{
            width: 500px;
            margin: 40px auto;
            padding: 25px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2{
            text-align: center;
            color: blue;
        }

        .form-group{
            margin-bottom: 15px;
        }

        label{
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input,
        select,
        textarea{
            width: 100%;
            padding: 8px;
            border: 1px solid gray;
            border-radius: 5px;
        }

        button{
            background-color: blue;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        button:hover{
            background-color: darkblue;
        }

        output{
            display: block;
            margin-top: 15px;
            color: green;
            font-weight: bold;
            text-align: center;
        }

        .back-home{
            text-align: center;
            margin-top: 15px;
        }

    </style>

    <script>
        function showMessage(event){
            event.preventDefault();

            let name = document.getElementById("name").value;

            document.getElementById("confirmation").value =
            "Thank You " + name +
            "! Your registration has been submitted successfully.";
        }
    </script>

</head>

<body>

    <div class="form-container">

        <h2>Event Registration Form</h2>

        <form onsubmit="showMessage(event)">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text"
                       id="name"
                       placeholder="Enter your full name"
                       required
                       autofocus>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email"
                       id="email"
                       placeholder="Enter your email address"
                       required>
            </div>

            <div class="form-group">
                <label for="date">Event Date</label>
                <input type="date"
                       id="date"
                       required>
            </div>

            <div class="form-group">
                <label for="eventType">Event Type</label>

                <select id="eventType" required>
                    <option value="">-- Select Event --</option>
                    <option>Community Clean-Up Drive</option>
                    <option>Local Farmers Market</option>
                    <option>Senior Citizen Wellness Camp</option>
                    <option>STEM Workshop for Kids</option>
                    <option>Deepavali Festival Celebration</option>
                    <option>Pet Adoption Fair</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Message</label>

                <textarea id="message"
                          rows="4"
                          placeholder="Enter your message"
                          required></textarea>
            </div>

            <button type="submit">Register</button>

            <output id="confirmation"></output>

        </form>

        <div class="back-home">
            <a href="index.html">← Back to Home</a>
        </div>

    </div>

</body>
</html>
