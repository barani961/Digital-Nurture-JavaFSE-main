<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>

    <link rel="stylesheet" href="../CSS/register.css">
</head>

<body>

    <div class="form-container">

        <h2>Event Registration Form</h2>

        <form onsubmit="showMessage(event)">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text"
                       id="name"
                       placeholder="Enter your full name"
                       required
                       autofocus>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email"
                       id="email"
                       placeholder="Enter your email address"
                       required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>

                <input type="text"
                       id="phone"
                       placeholder="Enter 10 digit phone number"
                       onblur="validatePhone()">
            </div>

            <div class="form-group">
                <label for="date">Event Date</label>
                <input type="date"
                       id="date"
                       required>
            </div>

            <div class="form-group">
                <label for="eventType">Event Type</label>

                <select id="eventType"
                        onchange="savePreference();">

                    <option value="">-- Select Event --</option>

                    <option value="100">
                        Community Clean-Up Drive
                    </option>

                    <option value="150">
                        Local Farmers Market
                    </option>

                    <option value="200">
                        Senior Citizen Wellness Camp
                    </option>

                    <option value="250">
                        STEM Workshop for Kids
                    </option>

                    <option value="300">
                        Deepavali Festival Celebration
                    </option>

                    <option value="120">
                        Pet Adoption Fair
                    </option>

                </select>

                <p id="feeDisplay"></p>

            </div>

            <div class="form-group">

                <label for="message">Message</label>

                <textarea id="message"
                          rows="4"
                          placeholder="Enter your message"
                          required
                          onkeyup="saveMessage()"></textarea>

            </div>

            <button type="submit">Register</button>

            <button type="button"
                    onclick="clearPreferences()">
                Clear Preferences
            </button>

            <output id="confirmation"></output>

        </form>

        <div class="back-home">
            <a href="index.html">← Back to Home</a>
        </div>

    </div>

<script>

function savePreference(){

    let eventType =
    document.getElementById("eventType").value;

    localStorage.setItem(
        "preferredEvent",
        eventType
    );
}

function saveMessage(){

    let msg =
    document.getElementById("message").value;

    sessionStorage.setItem(
        "userMessage",
        msg
    );
}

window.onload = function(){

    let savedEvent =
    localStorage.getItem("preferredEvent");

    if(savedEvent){

        document.getElementById("eventType").value =
        savedEvent;

        showFee();
    }
};

function clearPreferences(){

    localStorage.clear();

    sessionStorage.clear();

    alert("Preferences Cleared");
}

function showMessage(event){

    event.preventDefault();

    console.log("Form Submitted");

    console.log(
        "Preferred Event:",
        localStorage.getItem("preferredEvent")
    );

    console.log(
        "User Message:",
        sessionStorage.getItem("userMessage")
    );

    document.getElementById("confirmation").value =
    "Registration Successful!";
}

</script>

</body>
</html>
